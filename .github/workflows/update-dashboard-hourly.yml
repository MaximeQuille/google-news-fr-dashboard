name: Update Google News dashboard hourly

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: google-news-dashboard-hourly
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Restore SQLite state from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/supabase_sync.py pull --db sortie_google_news_fr_ULTRA_CLOUD/google_news_fr_ultra.sqlite

      - name: Collect new Google News articles
        run: |
          python google_news_fr_ultra_sqlite.py             --days 2             --mode ultra             --concurrency 35             --progress-every 500             --no-summary-backfill

      - name: Push updated state to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/supabase_sync.py push --db sortie_google_news_fr_ULTRA_CLOUD/google_news_fr_ultra.sqlite

      - name: Prepare Supabase static site
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/prepare_supabase_pages.py

      - name: Publish to gh-pages branch
        run: |
          cd public
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update dashboard $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
