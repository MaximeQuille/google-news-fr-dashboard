name: Send requested alert tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: google-news-alert-tests
  cancel-in-progress: false

jobs:
  send-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Process pending tests in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ALERT_CRON_SECRET: ${{ secrets.ALERT_CRON_SECRET }}
        run: |
          curl -fsS -X POST "${SUPABASE_URL%/}/functions/v1/process-alerts" \
            -H "Content-Type: application/json" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "x-alert-cron-secret: ${ALERT_CRON_SECRET}" \
            --data '{"action":"tests"}'
